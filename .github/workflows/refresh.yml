name: Daily stock data refresh

on:
  schedule:
    # NSE/BSE close at 15:30 IST. Yahoo finishes pushing closes by ~16:00 IST,
    # BSE typically finalises live mcap by ~16:30 IST. We schedule three runs
    # to catch the data the moment it's ready and self-correct if the earliest
    # run got partial data:
    - cron: "30 10 * * 1-5"   # 16:00 IST primary (closes usually fresh)
    - cron: "0  11 * * 1-5"   # 16:30 IST safety (mcap settled by now)
    - cron: "30 11 * * 1-5"   # 17:00 IST backup (always reliable)
    # Each later run cancels the previous in-flight one (see concurrency block
    # below), so fresher data always wins.
  workflow_dispatch: {}

permissions:
  contents: write

# Only one refresh run at a time. New triggers cancel any older in-flight run
# so a slow run can't push stale data on top of a fresh one.
concurrency:
  group: refresh-main
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download NSE + BSE scrip lists
        run: |
          curl -s -A "Mozilla/5.0" \
               "https://archives.nseindia.com/content/equities/EQUITY_L.csv" \
               -o /tmp/nse.csv
          curl -s -A "Mozilla/5.0" \
               -H "Referer: https://www.bseindia.com/" \
               "https://api.bseindia.com/BseIndiaAPI/api/ListofScripData/w?Group=&Scripcode=&industry=&segment=Equity&status=Active" \
               -o /tmp/bse.json
          wc -l /tmp/nse.csv
          ls -la /tmp/bse.json

      - name: Fetch price history from Yahoo Finance
        run: python3 scripts/fetch_all.py

      - name: Fetch sector metadata from BSE
        run: python3 scripts/fetch_sectors.py

      - name: Build dashboard HTML
        run: python3 scripts/build_compressed.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Save the newly built dashboard outside the working tree first.
          # We use a "reset-and-replay" strategy on push conflicts: pull latest
          # main, drop our new dashboard on top (overwrite, no merge), commit,
          # push. Avoids content-merge conflicts on the binary-ish HTML.
          cp docs/nse-bse-dashboard.html /tmp/new_dashboard.html

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/new_dashboard.html docs/nse-bse-dashboard.html
            git add docs/nse-bse-dashboard.html

            if git diff --cached --quiet; then
              echo "Remote already has identical dashboard — nothing to commit"
              exit 0
            fi

            git commit -m "Daily refresh $(TZ=Asia/Kolkata date +'%Y-%m-%d %H:%M IST')"
            if git push origin HEAD:main; then
              echo "Pushed on attempt #$attempt"
              exit 0
            fi
            echo "Push attempt #$attempt rejected; resetting and retrying"
            sleep $(( attempt * 3 ))
          done
          echo "Failed to push after 5 attempts"
          exit 1

      - name: Upload raw data as artifact (optional, 7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: stock_data
          path: scripts/stock_data.json
          retention-days: 7
          if-no-files-found: ignore
